<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iris Sheet — ドールアイ虹彩 印刷用シートメーカー</title>
<style>
  :root {
    --bg: #f4f2ee;
    --panel: #ffffff;
    --ink: #2b2926;
    --sub: #7a756d;
    --line: #e2ded6;
    --accent: #6c5ce7;
    --accent-soft: #efeaff;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: "Segoe UI", "Yu Gothic UI", "Hiragino Sans", sans-serif;
    background: var(--bg); color: var(--ink); font-size: 13px;
  }
  #app { display: flex; height: 100vh; }

  /* ---------- 左パネル ---------- */
  aside {
    width: 340px; min-width: 340px; background: var(--panel);
    border-right: 1px solid var(--line); overflow-y: auto; padding: 14px 16px 40px;
  }
  h1 { font-size: 16px; margin: 2px 0 2px; letter-spacing: .02em; }
  .tagline { color: var(--sub); font-size: 11px; margin-bottom: 14px; }
  details.sec { border: 1px solid var(--line); border-radius: 8px; margin-bottom: 10px; background: #fff; }
  details.sec > summary {
    cursor: pointer; padding: 8px 12px; font-weight: 600; user-select: none;
    list-style: none; display: flex; align-items: center; gap: 6px;
  }
  details.sec > summary::before { content: "▸"; color: var(--accent); transition: transform .15s; }
  details.sec[open] > summary::before { transform: rotate(90deg); }
  .sec-body { padding: 4px 12px 12px; border-top: 1px dashed var(--line); }

  .drops { display: flex; gap: 8px; }
  .drop {
    flex: 1; border: 2px dashed var(--line); border-radius: 8px; text-align: center;
    padding: 8px 4px; cursor: pointer; transition: border-color .15s, background .15s;
    position: relative; min-height: 118px;
  }
  .drop.dragover { border-color: var(--accent); background: var(--accent-soft); }
  .drop .side-label { font-weight: 700; font-size: 12px; }
  .drop .hint { color: var(--sub); font-size: 10px; margin-top: 2px; }
  .drop img.thumb {
    max-width: 84px; max-height: 84px; margin-top: 4px; border-radius: 4px;
    background: repeating-conic-gradient(#ddd 0% 25%, #fff 0% 50%) 0 0 / 12px 12px;
  }
  .row { display: flex; align-items: center; gap: 8px; margin: 7px 0; }
  .row label { flex: 1; }
  .row input[type=number] { width: 64px; }
  .row select { flex: 1; }
  input[type=number], select {
    padding: 4px 6px; border: 1px solid var(--line); border-radius: 6px;
    font: inherit; background: #fff; color: inherit;
  }
  input[type=range] { flex: 1.4; accent-color: var(--accent); }
  .val { width: 44px; text-align: right; color: var(--sub); font-variant-numeric: tabular-nums; }
  .check { display: flex; align-items: center; gap: 6px; margin: 7px 0; cursor: pointer; }
  .check input { accent-color: var(--accent); }

  /* バリエーションカード */
  .variant {
    border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; margin: 8px 0;
    background: #fcfbf9;
  }
  .variant .vhead { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .variant .vhead .vtitle { font-weight: 600; flex: 1; }
  .variant .vhead .swatch { width: 18px; height: 18px; border-radius: 50%; border: 1px solid var(--line); }
  .variant .row { margin: 4px 0; }
  .variant .row label { flex: 0 0 74px; color: var(--sub); }
  button {
    font: inherit; border: 1px solid var(--line); background: #fff; color: var(--ink);
    border-radius: 6px; padding: 5px 12px; cursor: pointer;
  }
  button:hover { border-color: var(--accent); color: var(--accent); }
  button.primary {
    background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600;
  }
  button.primary:hover { filter: brightness(1.08); color: #fff; }
  button.small { padding: 2px 8px; font-size: 11px; }
  button.danger:hover { border-color: #d63031; color: #d63031; }

  /* ---------- 右プレビュー ---------- */
  main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .toolbar {
    display: flex; align-items: center; gap: 10px; padding: 10px 16px;
    background: var(--panel); border-bottom: 1px solid var(--line); flex-wrap: wrap;
  }
  .toolbar .info { color: var(--sub); font-size: 12px; margin-right: auto; }
  .preview-wrap {
    flex: 1; overflow: auto; display: grid; place-items: center; padding: 24px;
  }
  #previewCanvas {
    background: #fff; box-shadow: 0 4px 24px rgba(0,0,0,.14);
    max-width: 100%; max-height: 100%;
  }
  .empty-note { color: var(--sub); text-align: center; line-height: 1.9; }
  footer-note { display: block; }
</style>
</head>
<body>
<div id="app">
  <aside>
    <h1>Iris Sheet</h1>
    <div class="tagline">ドールアイ虹彩 印刷用シートメーカー（画像は外部送信されません）</div>

    <details class="sec" open>
      <summary>虹彩画像（L / R）</summary>
      <div class="sec-body">
        <div class="drops">
          <div class="drop" id="dropL">
            <div class="side-label">L（左目）</div>
            <div class="hint">クリック or ドロップ</div>
            <img class="thumb" id="thumbL" hidden alt="L preview">
          </div>
          <div class="drop" id="dropR">
            <div class="side-label">R（右目）</div>
            <div class="hint">クリック or ドロップ</div>
            <img class="thumb" id="thumbR" hidden alt="R preview">
          </div>
        </div>
        <input type="file" id="fileL" accept="image/*" hidden>
        <input type="file" id="fileR" accept="image/*" hidden>
        <div class="row" style="margin-top:10px">
          <button class="small" id="btnSample">サンプル画像で試す</button>
          <button class="small" id="btnCopyLR">L→R 複製</button>
        </div>
        <label class="check"><input type="checkbox" id="whiteTransparent" checked>
          白背景を透明化する</label>
        <div class="row" id="whiteThrRow">
          <label>透明化しきい値</label>
          <input type="range" id="whiteThr" min="180" max="254" value="240">
          <span class="val" id="whiteThrVal">240</span>
        </div>
        <div class="hint" style="color:var(--sub);font-size:11px;line-height:1.5">
          虹彩の直径は透明部分を除いた画像の実サイズから自動検出します。
        </div>
      </div>
    </details>

    <details class="sec" open>
      <summary>寸法</summary>
      <div class="sec-body">
        <div class="row"><label>白目の直径 (mm)</label>
          <input type="number" id="scleraD" value="15" min="2" max="60" step="0.5"></div>
        <div class="row"><label>虹彩の最大直径 (mm)</label>
          <input type="number" id="irisD" value="7" min="1" max="60" step="0.5"></div>
        <label class="check"><input type="checkbox" id="drawSclera" checked>
          白目の円を描画する</label>
        <label class="check"><input type="checkbox" id="drawGuide" checked>
          切り取りガイド線を描画する</label>
      </div>
    </details>

    <details class="sec" open>
      <summary>用紙・配置</summary>
      <div class="sec-body">
        <div class="row"><label>用紙サイズ</label>
          <select id="paper">
            <option value="210x297" selected>A4 (210×297)</option>
            <option value="297x420">A3 (297×420)</option>
            <option value="182x257">B5 (182×257)</option>
            <option value="100x148">はがき (100×148)</option>
            <option value="89x127">L判 (89×127)</option>
            <option value="127x178">2L判 (127×178)</option>
            <option value="216x279">レター (216×279)</option>
          </select></div>
        <label class="check"><input type="checkbox" id="landscape">横向き</label>
        <div class="row"><label>余白 (mm)</label>
          <input type="number" id="marginMm" value="8" min="0" max="30" step="0.5"></div>
        <div class="row"><label>ペア内の間隔 (mm)</label>
          <input type="number" id="pairGapMm" value="2" min="0" max="20" step="0.5"></div>
        <div class="row"><label>ペア間・行間 (mm)</label>
          <input type="number" id="gapMm" value="4" min="0" max="20" step="0.5"></div>
        <div class="row"><label>解像度 (dpi)</label>
          <select id="dpi">
            <option value="300" selected>300</option>
            <option value="350">350</option>
            <option value="600">600</option>
          </select></div>
      </div>
    </details>

    <details class="sec" open>
      <summary>色バリエーション</summary>
      <div class="sec-body">
        <div class="hint" style="color:var(--sub);font-size:11px;line-height:1.5;margin-top:6px">
          列ブロックごとに色補正を変えて敷き詰めます。上から順に左の列から割り当てられ、足りない分は繰り返されます。
        </div>
        <div id="variants"></div>
        <button id="btnAddVariant">＋ バリエーションを追加</button>
      </div>
    </details>
  </aside>

  <main>
    <div class="toolbar">
      <span class="info" id="layoutInfo">画像を読み込むとプレビューが表示されます</span>
      <button id="btnPrint">印刷…</button>
      <button class="primary" id="btnExport">PNG を保存</button>
    </div>
    <div class="preview-wrap">
      <div class="empty-note" id="emptyNote">
        ← 左のパネルから L / R の虹彩画像を読み込んでください。<br>
        まずは「サンプル画像で試す」でも動作を確認できます。
      </div>
      <canvas id="previewCanvas" hidden></canvas>
    </div>
  </main>
</div>

<script>
"use strict";
/* ============================================================
 * Iris Sheet — すべてブラウザ内で完結。画像はどこにも送信されない。
 * ============================================================ */

const $ = id => document.getElementById(id);

const state = {
  src: { L: null, R: null },        // 元 Image
  processed: { L: null, R: null },  // {canvas, iris:{x,y,w,h,d}} 透明化・虹彩検出済み
  variants: [],                     // {hue,sat,bri,con,cols}
};

/* ---------- バリエーション ---------- */
function defaultVariant() { return { hue: 0, sat: 100, bri: 100, con: 100, cols: 2 }; }

function addVariant(v) {
  state.variants.push(v || defaultVariant());
  renderVariantUI();
  scheduleRender();
}

function variantFilter(v) {
  return `hue-rotate(${v.hue}deg) saturate(${v.sat}%) brightness(${v.bri}%) contrast(${v.con}%)`;
}

function renderVariantUI() {
  const box = $("variants");
  box.innerHTML = "";
  state.variants.forEach((v, i) => {
    const card = document.createElement("div");
    card.className = "variant";
    card.innerHTML = `
      <div class="vhead">
        <span class="swatch"></span>
        <span class="vtitle">ブロック ${i + 1}${i === 0 ? "（基準）" : ""}</span>
        <button class="small danger" data-act="del" ${state.variants.length === 1 ? "disabled" : ""}>削除</button>
      </div>
      <div class="row"><label>色相 (°)</label>
        <input type="range" data-k="hue" min="-180" max="180" value="${v.hue}"><span class="val">${v.hue}</span></div>
      <div class="row"><label>彩度 (%)</label>
        <input type="range" data-k="sat" min="0" max="200" value="${v.sat}"><span class="val">${v.sat}</span></div>
      <div class="row"><label>明るさ (%)</label>
        <input type="range" data-k="bri" min="30" max="170" value="${v.bri}"><span class="val">${v.bri}</span></div>
      <div class="row"><label>コントラスト (%)</label>
        <input type="range" data-k="con" min="30" max="200" value="${v.con}"><span class="val">${v.con}</span></div>
      <div class="row"><label>ペア列数</label>
        <input type="number" data-k="cols" min="1" max="20" value="${v.cols}" style="width:64px"></div>
    `;
    const swatch = card.querySelector(".swatch");
    const updateSwatch = () => {
      swatch.style.background = "conic-gradient(#8e44ad,#2980b9,#27ae60,#f1c40f,#e67e22,#c0392b,#8e44ad)";
      swatch.style.filter = variantFilter(v);
    };
    updateSwatch();
    card.querySelectorAll("input").forEach(inp => {
      inp.addEventListener("input", () => {
        const k = inp.dataset.k;
        v[k] = Number(inp.value);
        const val = inp.parentElement.querySelector(".val");
        if (val) val.textContent = inp.value;
        updateSwatch();
        scheduleRender();
      });
    });
    card.querySelector("[data-act=del]").addEventListener("click", () => {
      state.variants.splice(i, 1);
      renderVariantUI();
      scheduleRender();
    });
    box.appendChild(card);
  });
}

/* ---------- 画像読み込み ---------- */
function setupDrop(side) {
  const drop = $("drop" + side), file = $("file" + side);
  drop.addEventListener("click", () => file.click());
  file.addEventListener("change", () => file.files[0] && loadFile(file.files[0], side));
  ["dragover", "dragleave", "drop"].forEach(ev => drop.addEventListener(ev, e => {
    e.preventDefault();
    drop.classList.toggle("dragover", ev === "dragover");
    if (ev === "drop" && e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0], side);
  }));
}

function loadFile(f, side) {
  const url = URL.createObjectURL(f);
  const img = new Image();
  img.onload = () => { URL.revokeObjectURL(url); setSource(img, side); };
  img.src = url;
}

function setSource(img, side) {
  state.src[side] = img;
  reprocess(side);
}

/* 白背景の透明化 + 虹彩（不透明部）バウンディング検出 */
function reprocess(side) {
  const img = state.src[side];
  if (!img) return;
  const c = document.createElement("canvas");
  c.width = img.naturalWidth || img.width;
  c.height = img.naturalHeight || img.height;
  const ctx = c.getContext("2d", { willReadFrequently: true });
  ctx.drawImage(img, 0, 0);

  const data = ctx.getImageData(0, 0, c.width, c.height);
  const px = data.data;

  if ($("whiteTransparent").checked) {
    const thr = Number($("whiteThr").value);   // これ以上白いピクセルは完全透明
    const soft = Math.max(1, 255 - thr);       // thr〜255 の間でフェード
    for (let i = 0; i < px.length; i += 4) {
      const w = Math.min(px[i], px[i + 1], px[i + 2]); // 白さ = 最小チャンネル
      if (w >= thr) {
        px[i + 3] = 0;
      } else if (w > thr - soft) {
        px[i + 3] = Math.min(px[i + 3], Math.round(255 * (thr - w) / soft));
      }
    }
    ctx.putImageData(data, 0, 0);
  }

  // 不透明部分のバウンディングボックス（虹彩の実寸範囲）
  const d2 = ctx.getImageData(0, 0, c.width, c.height).data;
  let minX = c.width, minY = c.height, maxX = -1, maxY = -1;
  for (let y = 0; y < c.height; y++) {
    for (let x = 0; x < c.width; x++) {
      if (d2[(y * c.width + x) * 4 + 3] > 16) {
        if (x < minX) minX = x;
        if (x > maxX) maxX = x;
        if (y < minY) minY = y;
        if (y > maxY) maxY = y;
      }
    }
  }
  if (maxX < 0) { minX = 0; minY = 0; maxX = c.width - 1; maxY = c.height - 1; }
  const iris = { x: minX, y: minY, w: maxX - minX + 1, h: maxY - minY + 1 };
  iris.d = Math.max(iris.w, iris.h);

  state.processed[side] = { canvas: c, iris };

  // サムネイル
  const thumb = $("thumb" + side);
  thumb.src = c.toDataURL();
  thumb.hidden = false;

  scheduleRender();
}

/* ---------- レイアウト & 描画 ---------- */
const MM_PER_INCH = 25.4;

function getLayout() {
  const [pw, ph] = $("paper").value.split("x").map(Number);
  const landscape = $("landscape").checked;
  const paperW = landscape ? ph : pw, paperH = landscape ? pw : ph;
  const margin = Number($("marginMm").value);
  const gap = Number($("gapMm").value);         // ペア間・行間
  const pairGap = Number($("pairGapMm").value); // ペア内（L と R の間）
  const sclera = Number($("scleraD").value);
  const pairW = sclera * 2 + pairGap;
  const usableW = paperW - margin * 2, usableH = paperH - margin * 2;
  const pairCols = Math.max(0, Math.floor((usableW + gap) / (pairW + gap)));
  const rows = Math.max(0, Math.floor((usableH + gap) / (sclera + gap)));
  return { paperW, paperH, margin, gap, pairGap, sclera, pairW, pairCols, rows };
}

/* ペア列 → バリエーション割り当て（各バリエーションの「ペア列数」ぶん連続、以後繰り返し） */
function variantForPairColumn(p) {
  const vs = state.variants;
  const total = vs.reduce((s, v) => s + Math.max(1, v.cols), 0);
  let r = p % total;
  for (const v of vs) {
    r -= Math.max(1, v.cols);
    if (r < 0) return v;
  }
  return vs[0];
}

/* バリエーション適用済みの虹彩スプライトを事前生成 */
function buildSprite(side, v, irisPx) {
  const p = state.processed[side];
  const scale = irisPx / p.iris.d;
  const c = document.createElement("canvas");
  c.width = Math.max(1, Math.round(p.iris.w * scale));
  c.height = Math.max(1, Math.round(p.iris.h * scale));
  const ctx = c.getContext("2d");
  ctx.filter = variantFilter(v);
  ctx.imageSmoothingQuality = "high";
  ctx.drawImage(p.canvas, p.iris.x, p.iris.y, p.iris.w, p.iris.h, 0, 0, c.width, c.height);
  return c;
}

let renderQueued = false;
function scheduleRender() {
  if (renderQueued) return;
  renderQueued = true;
  // rAF はタブ非表示時に発火しないため setTimeout を使う
  setTimeout(() => { renderQueued = false; render(); }, 0);
}

function render() {
  const ready = state.processed.L && state.processed.R;
  $("previewCanvas").hidden = !ready;
  $("emptyNote").hidden = ready;
  if (!ready) return;
  if (state.variants.length === 0) addVariant();

  const dpi = Number($("dpi").value);
  const k = dpi / MM_PER_INCH; // px per mm
  const L = getLayout();
  const irisD = Number($("irisD").value);
  const canvas = $("previewCanvas");
  canvas.width = Math.round(L.paperW * k);
  canvas.height = Math.round(L.paperH * k);
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "#fff";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const irisPx = irisD * k;
  const scleraPx = L.sclera * k;

  // バリエーション×L/R のスプライトをキャッシュ生成
  const sprites = new Map();
  const spriteFor = (side, v) => {
    const key = side + JSON.stringify(v);
    if (!sprites.has(key)) sprites.set(key, buildSprite(side, v, irisPx));
    return sprites.get(key);
  };

  const drawSclera = $("drawSclera").checked;
  const drawGuide = $("drawGuide").checked;

  // 配置全体をセンタリング
  const usedW = L.pairCols > 0 ? (L.pairCols * (L.pairW + L.gap) - L.gap) : 0;
  const usedH = L.rows > 0 ? (L.rows * (L.sclera + L.gap) - L.gap) : 0;
  const ox = (L.paperW - usedW) / 2 * k;
  const oy = (L.paperH - usedH) / 2 * k;

  const drawCell = (cx, cy, sprite) => {
    if (drawSclera) {
      ctx.fillStyle = "#fff";
      ctx.beginPath();
      ctx.arc(cx, cy, scleraPx / 2, 0, Math.PI * 2);
      ctx.fill();
    }
    if (drawGuide) {
      ctx.strokeStyle = "#c8c4bc";
      ctx.lineWidth = Math.max(1, k * 0.08); // 0.08mm 相当の細線
      ctx.beginPath();
      ctx.arc(cx, cy, scleraPx / 2, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.drawImage(sprite, cx - sprite.width / 2, cy - sprite.height / 2);
  };

  for (let p = 0; p < L.pairCols; p++) {
    const v = variantForPairColumn(p);
    const pairX = p * (L.pairW + L.gap);
    for (let row = 0; row < L.rows; row++) {
      const cy = oy + (row * (L.sclera + L.gap) + L.sclera / 2) * k;
      drawCell(ox + (pairX + L.sclera / 2) * k, cy, spriteFor("L", v));
      drawCell(ox + (pairX + L.sclera + L.pairGap + L.sclera / 2) * k, cy, spriteFor("R", v));
    }
  }

  const pairs = L.pairCols * L.rows;
  $("layoutInfo").textContent =
    `${L.pairCols} ペア列 × ${L.rows} 行 = ${pairs} ペア（${pairs * 2} 個） / ` +
    `${canvas.width}×${canvas.height}px @ ${dpi}dpi`;
}

/* ---------- PNG 出力（pHYs チャンクで実寸 DPI を埋め込み） ---------- */
const crcTable = (() => {
  const t = new Uint32Array(256);
  for (let n = 0; n < 256; n++) {
    let c = n;
    for (let i = 0; i < 8; i++) c = (c & 1) ? 0xEDB88320 ^ (c >>> 1) : c >>> 1;
    t[n] = c >>> 0;
  }
  return t;
})();
function crc32(bytes) {
  let c = 0xFFFFFFFF;
  for (const b of bytes) c = crcTable[(c ^ b) & 0xFF] ^ (c >>> 8);
  return (c ^ 0xFFFFFFFF) >>> 0;
}
function pngWithDpi(buf, dpi) {
  const src = new Uint8Array(buf);
  const ppm = Math.round(dpi / 0.0254); // pixels per metre
  const chunk = new Uint8Array(21); // len(4)+type(4)+data(9)+crc(4)
  const dv = new DataView(chunk.buffer);
  dv.setUint32(0, 9);
  chunk.set([0x70, 0x48, 0x59, 0x73], 4); // "pHYs"
  dv.setUint32(8, ppm); dv.setUint32(12, ppm);
  chunk[16] = 1; // unit: metre
  dv.setUint32(17, crc32(chunk.subarray(4, 17)));
  // IHDR 直後（8バイト署名 + IHDR チャンク全長）に挿入
  const ihdrLen = new DataView(buf).getUint32(8);
  const at = 8 + 12 + ihdrLen;
  const out = new Uint8Array(src.length + 21);
  out.set(src.subarray(0, at));
  out.set(chunk, at);
  out.set(src.subarray(at), at + 21);
  return out;
}

async function exportPNG() {
  const canvas = $("previewCanvas");
  if (canvas.hidden) return;
  const dpi = Number($("dpi").value);
  const blob = await new Promise(r => canvas.toBlob(r, "image/png"));
  const buf = await blob.arrayBuffer();
  const withDpi = pngWithDpi(buf, dpi);
  const a = document.createElement("a");
  const paper = $("paper").selectedOptions[0].textContent.split(" ")[0];
  a.href = URL.createObjectURL(new Blob([withDpi], { type: "image/png" }));
  a.download = `iris-sheet_${paper}_${dpi}dpi.png`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
}

/* ---------- 印刷（mm 実寸指定、倍率100%で印刷すること） ---------- */
function printSheet() {
  const canvas = $("previewCanvas");
  if (canvas.hidden) return;
  const L = getLayout();
  const w = window.open("", "_blank");
  w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>印刷</title>
    <style>
      @page { size: ${L.paperW}mm ${L.paperH}mm; margin: 0; }
      html, body { margin: 0; }
      img { width: ${L.paperW}mm; height: ${L.paperH}mm; display: block; }
    </style></head><body>
    <img src="${canvas.toDataURL("image/png")}" onload="print()">
    </body></html>`);
  w.document.close();
}

/* ---------- サンプル画像生成（動作確認用の手描き風虹彩） ---------- */
function makeSampleIris(seedHue) {
  const S = 400, c = document.createElement("canvas");
  c.width = S; c.height = S;
  const ctx = c.getContext("2d");
  const cx = S / 2, cy = S / 2, r = S * 0.46;
  // 虹彩ベース
  let g = ctx.createRadialGradient(cx, cy, r * 0.1, cx, cy, r);
  g.addColorStop(0, `hsl(${seedHue + 30} 60% 30%)`);
  g.addColorStop(0.55, `hsl(${seedHue} 70% 45%)`);
  g.addColorStop(0.9, `hsl(${seedHue - 20} 75% 25%)`);
  g.addColorStop(1, `hsl(${seedHue - 25} 70% 12%)`);
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
  // 放射スジ
  ctx.globalAlpha = 0.35;
  for (let i = 0; i < 90; i++) {
    const a = (i / 90) * Math.PI * 2 + Math.sin(i * 7) * 0.05;
    ctx.strokeStyle = i % 2 ? `hsl(${seedHue + 40} 80% 65%)` : `hsl(${seedHue - 30} 60% 20%)`;
    ctx.lineWidth = 1.5 + (i % 3);
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a) * r * 0.25, cy + Math.sin(a) * r * 0.25);
    ctx.lineTo(cx + Math.cos(a) * r * 0.95, cy + Math.sin(a) * r * 0.95);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
  // 瞳孔
  g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 0.32);
  g.addColorStop(0, "#000");
  g.addColorStop(0.85, "#000");
  g.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(cx, cy, r * 0.32, 0, Math.PI * 2); ctx.fill();
  // ハイライト
  ctx.fillStyle = "rgba(255,255,255,.95)";
  ctx.beginPath(); ctx.arc(cx - r * 0.35, cy - r * 0.35, r * 0.11, 0, Math.PI * 2); ctx.fill();
  const img = new Image();
  img.src = c.toDataURL();
  return img;
}

/* ---------- 初期化 ---------- */
setupDrop("L");
setupDrop("R");
addVariant();

/* data URL 画像は同期的に complete になることがあり、後付け onload では発火しない */
function whenReady(img, fn) {
  if (img.complete && (img.naturalWidth || 0) > 0) fn();
  else img.onload = fn;
}

$("btnSample").addEventListener("click", () => {
  const l = makeSampleIris(255);
  whenReady(l, () => {
    setSource(l, "L");
    setSource(l, "R"); // ハイライト位置は左右で同じにする
  });
});
$("btnCopyLR").addEventListener("click", () => {
  if (!state.src.L) return;
  setSource(state.src.L, "R"); // 反転せずそのまま複製（ハイライト位置を揃える）
});

$("whiteThr").addEventListener("input", () => {
  $("whiteThrVal").textContent = $("whiteThr").value;
  reprocess("L"); reprocess("R");
});
$("whiteTransparent").addEventListener("change", () => {
  $("whiteThrRow").style.opacity = $("whiteTransparent").checked ? 1 : 0.4;
  reprocess("L"); reprocess("R");
});

["scleraD", "irisD", "drawSclera", "drawGuide", "paper", "landscape",
 "marginMm", "gapMm", "pairGapMm", "dpi"].forEach(id => {
  $(id).addEventListener("input", scheduleRender);
  $(id).addEventListener("change", scheduleRender);
});

$("btnAddVariant").addEventListener("click", () => {
  const last = state.variants[state.variants.length - 1];
  const v = defaultVariant();
  v.hue = ((last ? last.hue : 0) + 60 + 180) % 360 - 180; // 前のブロックから+60°ずらす
  addVariant(v);
});
$("btnExport").addEventListener("click", exportPNG);
$("btnPrint").addEventListener("click", printSheet);
